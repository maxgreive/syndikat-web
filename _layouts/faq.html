---
layout: default
---

<div class="page-head">
  <div class="container">
    <div class="row">
      <div class="col col-12">
        <div class="page__info">
          <h1 class="page__title">{{- page.title -}}</h1>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container animate">
  <article class="page">
    <div class="page__content">
      <p>{{ content }}</p>

      <ul class="faq-questions">
        {% for faq in site.data.faqs %}
        <li>
          <details open>
            <summary>
              {{ faq.question }}
            </summary>
            <p>{{ faq.answer }}</p>
            {% if faq.list %}
            <ul>
              {% for item in faq.list %}
              <li>{{ item }}</li>
              {% endfor %}
            </ul>
            {% endif %}
          </details>
        </li>
        {% endfor %}
      </ul>
    </div>
  </article>
</div>
